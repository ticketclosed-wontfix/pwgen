<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key &amp; Passphrase Generator</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23c96442'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='white'>🔐</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl-fast.min.js"></script>
<style>
  :root {
    --parchment: #f5f4ed; --ivory: #faf9f5; --white: #ffffff;
    --near-black: #141413; --dark-surface: #30302e;
    --terracotta: #c96442; --charcoal: #4d4c48; --olive-gray: #5e5d59;
    --stone-gray: #87867f; --warm-silver: #b0aea5;
    --border-cream: #f0eee6; --border-warm: #e8e6dc; --ring-warm: #d1cfc5;
    --success: #4a7c59;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--sans); background: var(--parchment); color: var(--near-black);
    font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased;
    min-height: 100vh; display: flex; flex-direction: column;
  }
  .container { max-width: 660px; width: 100%; margin: 0 auto; padding: 28px 20px 20px; flex: 1; }

  /* Header */
  .header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
  .header h1 { font-family: var(--serif); font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
  .header-links { display: flex; gap: 14px; }
  .header-links a { font-size: 12px; color: var(--stone-gray); text-decoration: none; }
  .header-links a:hover { color: var(--charcoal); }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 14px; background: var(--ivory); border: 1px solid var(--border-cream); border-radius: 9px; padding: 4px; }
  .tab-btn {
    flex: 1; padding: 8px 0; background: none; border: none; border-radius: 7px;
    font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--stone-gray);
    cursor: pointer; transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--charcoal); }
  .tab-btn.active { background: var(--white); color: var(--near-black); box-shadow: rgba(0,0,0,0.06) 0 1px 4px; }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Card */
  .card {
    background: var(--ivory); border: 1px solid var(--border-cream); border-radius: 10px;
    padding: 18px; margin-bottom: 10px; box-shadow: rgba(0,0,0,0.03) 0 2px 12px;
  }

  /* Presets */
  .presets-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .preset-btn {
    flex: 1; background: var(--white); border: 1px solid var(--border-warm); border-radius: 8px;
    padding: 10px 8px; cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .preset-btn:hover { border-color: var(--ring-warm); }
  .preset-btn.active { border-color: var(--terracotta); box-shadow: 0 0 0 1px var(--terracotta); }
  .preset-name { font-family: var(--serif); font-size: 14px; font-weight: 500; color: var(--near-black); }
  .preset-desc { font-size: 11px; color: var(--stone-gray); margin-top: 1px; }

  /* Sliders */
  .sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 18px; }
  .slider-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .slider-label { font-size: 12px; font-weight: 500; color: var(--charcoal); }
  .slider-value { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--terracotta); }
  input[type="range"] { -webkit-appearance: none; width: 100%; height: 5px; background: var(--border-warm); border-radius: 3px; outline: none; cursor: pointer; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--near-black); cursor: pointer; }
  input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: var(--near-black); border: none; cursor: pointer; }

  /* Options row */
  .options-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .opt-btn {
    flex: 1; background: var(--white); border: 1px solid var(--border-warm); border-radius: 7px;
    padding: 9px 8px; cursor: pointer; transition: all 0.15s; text-align: center;
    font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--charcoal);
  }
  .opt-btn:hover { border-color: var(--ring-warm); }
  .opt-btn.active { border-color: var(--terracotta); box-shadow: 0 0 0 1px var(--terracotta); color: var(--terracotta); }

  /* Generate */
  .gen-btn {
    display: block; width: 100%; margin-top: 14px; padding: 10px 20px;
    background: var(--terracotta); border: none; border-radius: 8px; color: var(--white);
    font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .gen-btn:hover { background: #b8593a; }

  /* Results header */
  .results-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
  }
  .results-header .label { font-size: 11px; font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase; color: var(--stone-gray); }
  .results-header .right { display: flex; align-items: center; gap: 12px; }
  .entropy-inline { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--success); }
  .copy-all-btn { font-size: 12px; font-weight: 500; color: var(--terracotta); background: none; border: none; cursor: pointer; padding: 0; font-family: var(--sans); }
  .copy-all-btn:hover { text-decoration: underline; }

  /* Passphrase rows */
  .pp-row {
    display: flex; align-items: center; gap: 10px; padding: 8px 11px;
    background: var(--white); border: 1px solid var(--border-cream); border-radius: 7px;
    margin-bottom: 5px; transition: border-color 0.1s;
  }
  .pp-row:hover { border-color: var(--border-warm); }
  .pp-text { flex: 1; font-family: var(--mono); font-size: 12.5px; color: var(--near-black); word-break: break-all; line-height: 1.5; user-select: all; }
  .copy-btn {
    background: none; border: 1px solid var(--border-cream); border-radius: 5px; padding: 5px;
    cursor: pointer; color: var(--stone-gray); transition: all 0.1s;
    display: flex; align-items: center; justify-content: center; min-width: 28px; height: 28px; flex-shrink: 0;
  }
  .copy-btn:hover { border-color: var(--border-warm); color: var(--charcoal); }
  .copy-btn.copied { color: var(--success); border-color: rgba(74,124,89,0.3); }
  .copy-btn svg { width: 13px; height: 13px; }

  /* Key output */
  .key-block {
    background: var(--white); border: 1px solid var(--border-cream); border-radius: 7px;
    margin-bottom: 8px; overflow: hidden;
  }
  .key-block-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 12px; background: var(--ivory); border-bottom: 1px solid var(--border-cream);
  }
  .key-block-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--stone-gray); }
  .key-block pre {
    padding: 10px 12px; margin: 0; font-family: var(--mono); font-size: 11.5px;
    color: var(--near-black); word-break: break-all; white-space: pre-wrap; line-height: 1.5;
    max-height: 120px; overflow-y: auto; user-select: all;
  }
  .key-block.secret pre { color: var(--terracotta); }

  /* Warning */
  .warn {
    font-size: 11px; color: var(--stone-gray); line-height: 1.4;
    padding: 10px 12px; background: rgba(201,100,66,0.04); border: 1px solid rgba(201,100,66,0.1);
    border-radius: 7px; margin-top: 8px;
  }

  /* Empty state */
  .empty-state { text-align: center; padding: 18px 10px; color: var(--stone-gray); font-size: 13px; }

  /* Footer */
  .footer { padding: 14px 20px; text-align: center; border-top: 1px solid var(--border-cream); }
  .footer p { font-size: 11px; color: var(--stone-gray); line-height: 1.5; }
  .footer a { color: var(--olive-gray); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--near-black); color: var(--ivory); padding: 8px 16px; border-radius: 7px;
    font-size: 12px; font-weight: 500; z-index: 100; transition: transform 0.2s ease;
    box-shadow: rgba(0,0,0,0.12) 0 6px 20px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 520px) {
    .container { padding: 18px 14px 14px; }
    .sliders { grid-template-columns: 1fr; gap: 10px; }
    .header { flex-direction: column; gap: 4px; }
    .presets-row { flex-direction: column; }
    .pp-text { font-size: 11.5px; }
    .key-block pre { font-size: 10.5px; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition-duration: 0s !important; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Key &amp; Passphrase Generator</h1>
    <div class="header-links"><a href="https://github.com/ticketclosed-wontfix/pwgen" target="_blank">Source</a></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('passphrase')">Passphrase</button>
    <button class="tab-btn" onclick="switchTab('bip39')">BIP-39 Seed</button>
    <button class="tab-btn" onclick="switchTab('wireguard')">WireGuard</button>
    <button class="tab-btn" onclick="switchTab('ssh')">SSH</button>
  </div>

  <!-- PASSPHRASE PANEL -->
  <div class="panel active" id="panel-passphrase">
    <div class="card">
      <div class="presets-row">
        <button class="preset-btn active" onclick="applyPreset('short',this)"><div class="preset-name">Short</div><div class="preset-desc">~25 chars</div></button>
        <button class="preset-btn" onclick="applyPreset('medium',this)"><div class="preset-name">Medium</div><div class="preset-desc">~39 chars</div></button>
        <button class="preset-btn" onclick="applyPreset('long',this)"><div class="preset-name">Long</div><div class="preset-desc">~73 chars</div></button>
      </div>
      <div class="sliders">
        <div><div class="slider-header"><span class="slider-label">Words</span><span class="slider-value" id="v-wc">4</span></div><input type="range" id="s-wc" min="2" max="8" value="4" oninput="updPP()"></div>
        <div><div class="slider-header"><span class="slider-label">Word length</span><span class="slider-value" id="v-wl">3 – 5</span></div><div style="display:flex;gap:8px"><input type="range" id="s-wmin" min="2" max="12" value="3" style="flex:1" oninput="updPP()"><input type="range" id="s-wmax" min="3" max="15" value="5" style="flex:1" oninput="updPP()"></div></div>
        <div><div class="slider-header"><span class="slider-label">Digits between</span><span class="slider-value" id="v-nl">1</span></div><input type="range" id="s-nl" min="0" max="4" value="1" oninput="updPP()"></div>
        <div><div class="slider-header"><span class="slider-label">Substitutions/word</span><span class="slider-value" id="v-sp">0</span></div><input type="range" id="s-sp" min="0" max="5" value="0" oninput="updPP()"></div>
        <div><div class="slider-header"><span class="slider-label">Min total length</span><span class="slider-value" id="v-minlen">off</span></div><input type="range" id="s-minlen" min="0" max="80" value="0" oninput="updPP()"></div>
        <div><div class="slider-header"><span class="slider-label">Max total length</span><span class="slider-value" id="v-maxlen">off</span></div><input type="range" id="s-maxlen" min="0" max="120" value="0" oninput="updPP()"></div>
      </div>
      <button class="gen-btn" onclick="genPP()">Generate</button>
    </div>
    <div id="out-pp"><div class="card"><div class="empty-state">Click Generate</div></div></div>
  </div>

  <!-- BIP-39 PANEL -->
  <div class="panel" id="panel-bip39">
    <div class="card">
      <div class="options-row">
        <button class="opt-btn active" onclick="bip39Len(12,this)">12 words</button>
        <button class="opt-btn" onclick="bip39Len(24,this)">24 words</button>
      </div>
      <button class="gen-btn" onclick="genBIP39()">Generate seed phrase</button>
    </div>
    <div id="out-bip39"><div class="card"><div class="empty-state">Click Generate</div></div></div>
  </div>

  <!-- WIREGUARD PANEL -->
  <div class="panel" id="panel-wireguard">
    <div class="card">
      <button class="gen-btn" onclick="genWG()">Generate keypair</button>
    </div>
    <div id="out-wg"><div class="card"><div class="empty-state">Click Generate</div></div></div>
  </div>

  <!-- SSH PANEL -->
  <div class="panel" id="panel-ssh">
    <div class="card">
      <div class="options-row">
        <button class="opt-btn active" onclick="sshType('ed25519',this)">Ed25519</button>
      </div>
      <button class="gen-btn" onclick="genSSH()">Generate keypair</button>
    </div>
    <div id="out-ssh"><div class="card"><div class="empty-state">Click Generate</div></div></div>
  </div>
</div>

<footer class="footer">
  <p>Runs in your browser — nothing sent or stored · <a href="https://github.com/ticketclosed-wontfix/pwgen" target="_blank">Open source</a> · Based on <a href="https://github.com/0xdaniooo/Secure-Passphrase-Generator" target="_blank">0xdaniooo</a></p>
</footer>

const numMap = ['4','6','7','6','3','4','9','6','1','1','7','1','3','5','0','9','9','2','5','7','8','8','9','9','9','2'];

function pick(a){return a[Math.floor(Math.random()*a.length)]}
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function updPP(){
  let mn=+document.getElementById('s-wmin').value,mx=+document.getElementById('s-wmax').value;
  if(mn>=mx){mx=mn+1;document.getElementById('s-wmax').value=mx}
  document.getElementById('v-wc').textContent=document.getElementById('s-wc').value;
  document.getElementById('v-wl').textContent=mn+' \u2013 '+mx;
  document.getElementById('v-nl').textContent=document.getElementById('s-nl').value;
  document.getElementById('v-sp').textContent=document.getElementById('s-sp').value;
  document.getElementById('v-minlen').textContent=document.getElementById('s-minlen').value||'off';
  document.getElementById('v-maxlen').textContent=document.getElementById('s-maxlen').value||'off';
}

function mkPP(wc,wmin,wmax,nl,sp){
  const pool=PP_WORDS.filter(w=>w.length>=wmin&&w.length<=wmax);
  if(!pool.length)return'Error';
  const parts=[];
  for(let i=0;i<wc;i++){
    let w=pick(pool);w=w[0].toUpperCase()+w.slice(1);
    if(sp>0&&w.length>1){
      const c=w.split(''),av=[];
      for(let j=1;j<c.length;j++)if(alphabet.indexOf(c[j].toLowerCase())!==-1)av.push(j);
      const tc=av.sort(()=>Math.random()-.5).slice(0,Math.min(sp,av.length));
      for(const j of tc){const idx=alphabet.indexOf(c[j].toLowerCase());if(idx!==-1)c[j]=numMap[idx]}
      w=c.join('');
    }
    parts.push(w);
    if(i<wc-1&&nl>0){let d='';for(let x=0;x<nl;x++)d+=ri(0,9);const s=pick(spChars);parts.push(ri(0,1)?s+d:d+s)}
  }
  return parts.join('');
}

function ent(pp){const h=/[a-z]/.test(pp),u=/[A-Z]/.test(pp),d=/[0-9]/.test(pp),s=/[^a-zA-Z0-9]/.test(pp);let p=0;if(h)p+=26;if(u)p+=26;if(d)p+=10;if(s)p+=18;return Math.round(pp.length*Math.log2(p||26))}

  const minLen=+document.getElementById('s-minlen').value,maxLen=+document.getElementById('s-maxlen').value;
  const r=[];for(let i=0;i<5;i++){
    let wc=wc0,wmin=wmin0,wmax=wmax0;
    // Auto-expand settings to meet min length
    if(minLen>0){
      const estPerWord=((wmin+wmax)/2)+((nl+1)*(wc>1?1:0))+1;
      const estTotal=estPerWord*wc;
      if(estTotal<minLen){
        wmin=Math.max(wmin,Math.ceil((minLen/wc)-(nl+1)));
        wmax=Math.min(20,Math.max(wmax,wmin+3));
      }
    }
    // Auto-shrink to fit max length
    if(maxLen>0){
      const estPerWordMax=wmax+((nl+1)*(wc>1?1:0))+1;
      if(estPerWordMax*wc>maxLen){
        wmax=Math.max(3,Math.floor((maxLen/wc)-(nl+1)));
        if(wmin>wmax)wmin=Math.max(2,wmax-1);
      }
    }
    let p=mkPP(wc,wmin,wmax,nl,sp),tries=0;
    if(minLen>0||maxLen>0){
      while(tries<500){
        if((minLen===0||p.length>=minLen)&&(maxLen===0||p.length<=maxLen))break;
        p=mkPP(wc,wmin,wmax,nl,sp);tries++;
      }
    }
    r.push(p);
  }
  const ae=Math.round(r.reduce((s,p)=>s+ent(p),0)/r.length);
  let h='<div class="card"><div class="results-header"><span class="label">Generated</span><div class="right"><span class="entropy-inline">'+ae+' bits avg</span><button class="copy-all-btn" onclick="copyAll(this)">Copy all</button></div></div>';
  r.forEach(p=>{h+='<div class="pp-row"><span class="pp-text">'+esc(p)+'</span>'+copyBtn(p)+'</div>'});
  h+='</div>';document.getElementById('out-pp').innerHTML=h;
}

// ─── BIP-39 ───
let bip39Words=12;
function bip39Len(n,btn){
  bip39Words=n;
  document.querySelectorAll('#panel-bip39 .opt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

async function genBIP39(){
  const bits=bip39Words===12?128:256;
  const bytes=new Uint8Array(bits/8);
  crypto.getRandomValues(bytes);
  const hash=new Uint8Array(await crypto.subtle.digest('SHA-256',bytes));
  const cs=bits/32;
  let bits2='';
  for(const b of bytes)bits2+=b.toString(2).padStart(8,'0');
  for(let i=0;i<cs;i++)bits2+=((hash[0]>>>(7-i))&1).toString();
  const words=[];
  for(let i=0;i<bits2.length;i+=11){const idx=parseInt(bits2.substr(i,11),2);words.push(BIP39[idx])}
  const mnemonic=words.join(' ');
  let h='<div class="card"><div class="results-header"><span class="label">'+bip39Words+'-word seed phrase</span><div class="right"><button class="copy-all-btn" onclick="copyText(this,\''+escJs(mnemonic)+'\')">Copy</button></div></div>';
  h+='<div class="pp-row"><span class="pp-text" style="font-size:13px;line-height:1.7">'+esc(mnemonic)+'</span></div>';
  h+='<div class="warn">\u26A0\uFE0F Store this phrase securely. Anyone with these words can recover your wallet. Never share it.</div>';
  h+='</div>';document.getElementById('out-bip39').innerHTML=h;
}

// ─── WIREGUARD ───
function genWG(){
  const kp=nacl.box.keyPair();
  const priv=b64(kp.secretKey);
  const pub=b64(kp.publicKey);
  let h='<div class="card"><div class="results-header"><span class="label">WireGuard Keypair</span></div>';
  h+=keyBlock('PUBLIC KEY',pub,false);
  h+=keyBlock('PRIVATE KEY',priv,true);
  h+='<div class="warn">Store the private key securely. Add <code>PublicKey = '+pub+'</code> to your peer config.</div>';
  h+='</div>';document.getElementById('out-wg').innerHTML=h;
}

// ─── SSH ───
let sshKeyType='ed25519';
function sshType(t,btn){
  sshKeyType=t;
  document.querySelectorAll('#panel-ssh .opt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function genSSH(){
  const kp=nacl.sign.keyPair();
  const pubBytes=concat(strBytes('ssh-ed25519'),kp.publicKey);
  const pubLine='ssh-ed25519 '+b64(pubBytes)+' generated@pwgen';
  const opensshPriv=encodeOpenSSH(kp);
  let h='<div class="card"><div class="results-header"><span class="label">SSH Ed25519 Keypair</span></div>';
  h+=keyBlock('PUBLIC KEY (authorized_keys)',pubLine,false);
  h+=keyBlock('PRIVATE KEY (id_ed25519)',opensshPriv,true);
  h+='<div class="warn">Save the private key to <code>~/.ssh/id_ed25519</code> and run <code>chmod 600</code>. Add the public key to <code>~/.ssh/authorized_keys</code> on the server.</div>';
  h+='</div>';document.getElementById('out-ssh').innerHTML=h;
}

function encodeOpenSSH(kp){
  const checkInt=crypto.getRandomValues(new Uint32Array(1))[0];
  const ci=new Uint8Array(4);new DataView(ci.buffer).setUint32(0,checkInt);
  const ci2=new Uint8Array(4);new DataView(ci2.buffer).setUint32(0,checkInt);
  const privBody=concat(
    ci,ci2,
    strBytes('ssh-ed25519'),
    u32BE(32),kp.publicKey,
    u32BE(64),kp.secretKey.slice(0,64),
    strBytes('generated@pwgen')
  );
  const pad=[];
  for(let i=1;privBody.length+pad.length&7;i++)pad.push(i&0xff);
  const full=concat(
    strBytes('openssh-key-v1\0'),
    u32BE(4),strBytes('none'),
    u32BE(4),strBytes('none'),
    u32BE(0),
    u32BE(1),
    u32BE(4+11+4+32+4+32),
    concat(u32BE(11),strBytes('ssh-ed25519'),u32BE(32),kp.publicKey),
    u32BE(privBody.length+pad.length),concat(privBody,new Uint8Array(pad))
  );
  return b64(full);
}

// ─── HELPERS ───
function b64(arr){let s='';for(const b of arr)s+=String.fromCharCode(b);return btoa(s)}
function strBytes(s){const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a}
function u32BE(n){const a=new Uint8Array(4);new DataView(a.buffer).setUint32(0,n);return a}
function concat(...arrs){let l=0;for(const a of arrs)l+=a.length;const r=new Uint8Array(l);let o=0;for(const a of arrs){r.set(a,o);o+=a.length}return r}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escJs(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n')}

function copyBtn(text){return '<button class="copy-btn" onclick="cp(this,\''+escJs(text)+'\')" title="Copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>'}

function keyBlock(label,text,isSecret){
  return '<div class="key-block'+(isSecret?' secret':'')+'"><div class="key-block-header"><span class="key-block-label">'+label+'</span>'+copyBtn(text)+'</div><pre>'+esc(text)+'</pre></div>';
}

function cp(btn,text){navigator.clipboard.writeText(text).then(()=>{btn.classList.add('copied');toast('Copied');setTimeout(()=>btn.classList.remove('copied'),1200)})}
function copyAll(btn){const t=Array.from(btn.closest('.card').querySelectorAll('.pp-text')).map(e=>e.textContent).join('\n');navigator.clipboard.writeText(t).then(()=>toast('Copied all'))}
function copyText(btn,text){navigator.clipboard.writeText(text).then(()=>toast('Copied'))}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}

document.addEventListener('DOMContentLoaded',()=>updPP());
</script>
