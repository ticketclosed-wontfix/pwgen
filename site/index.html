<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Passphrase Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --parchment: #f5f4ed;
    --ivory: #faf9f5;
    --white: #ffffff;
    --near-black: #141413;
    --dark-surface: #30302e;
    --terracotta: #c96442;
    --charcoal: #4d4c48;
    --olive-gray: #5e5d59;
    --stone-gray: #87867f;
    --warm-silver: #b0aea5;
    --border-cream: #f0eee6;
    --border-warm: #e8e6dc;
    --ring-warm: #d1cfc5;
    --success: #4a7c59;

    --serif: Georgia, 'Times New Roman', serif;
    --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--parchment);
    color: var(--near-black);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── LAYOUT ─── */
  .container {
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 20px 24px;
    flex: 1;
  }

  /* ─── HEADER ─── */
  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .header h1 {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    color: var(--near-black);
    letter-spacing: -0.01em;
  }
  .header-links {
    display: flex;
    gap: 14px;
  }
  .header-links a {
    font-size: 12px;
    color: var(--stone-gray);
    text-decoration: none;
    transition: color 0.15s;
  }
  .header-links a:hover { color: var(--charcoal); }

  /* ─── CARD ─── */
  .card {
    background: var(--ivory);
    border: 1px solid var(--border-cream);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: rgba(0,0,0,0.03) 0px 2px 12px;
  }

  /* ─── PRESETS ─── */
  .presets-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .preset-btn {
    flex: 1;
    background: var(--white);
    border: 1px solid var(--border-warm);
    border-radius: 8px;
    padding: 10px 8px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .preset-btn:hover { border-color: var(--ring-warm); }
  .preset-btn.active {
    border-color: var(--terracotta);
    box-shadow: 0px 0px 0px 1px var(--terracotta);
  }
  .preset-name {
    font-family: var(--serif);
    font-size: 14px;
    font-weight: 500;
    color: var(--near-black);
  }
  .preset-desc {
    font-size: 11px;
    color: var(--stone-gray);
    margin-top: 1px;
  }

  /* ─── SLIDERS ─── */
  .sliders {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 20px;
  }
  .slider-group {}
  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .slider-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--charcoal);
  }
  .slider-value {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--terracotta);
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 5px;
    background: var(--border-warm);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--near-black);
    cursor: pointer;
    box-shadow: 0px 0px 0px 0px var(--ring-warm), 0px 0px 0px 1px rgba(0,0,0,0.08);
    transition: box-shadow 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0px 0px 0px 3px rgba(20, 20, 19, 0.06);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--near-black);
    cursor: pointer;
    border: none;
  }

  /* ─── GENERATE ─── */
  .generate-btn {
    display: block;
    width: 100%;
    margin-top: 16px;
    padding: 11px 20px;
    background: var(--terracotta);
    border: none;
    border-radius: 8px;
    color: var(--white);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0px 0px 0px 0px var(--terracotta), 0px 0px 0px 1px rgba(201,100,66,0.25);
  }
  .generate-btn:hover { background: #b8593a; }
  .generate-btn:active { transform: scale(0.995); }

  /* ─── RESULTS ─── */
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .results-header .label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    color: var(--stone-gray);
  }
  .entropy-inline {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--success);
  }
  .copy-all-btn {
    font-size: 12px;
    font-weight: 500;
    color: var(--terracotta);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    font-family: var(--sans);
  }
  .copy-all-btn:hover { text-decoration: underline; }

  .passphrase-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    background: var(--white);
    border: 1px solid var(--border-cream);
    border-radius: 7px;
    margin-bottom: 6px;
    transition: border-color 0.1s;
  }
  .passphrase-row:hover { border-color: var(--border-warm); }
  .passphrase-row:last-of-type { margin-bottom: 0; }

  .passphrase-text {
    flex: 1;
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--near-black);
    word-break: break-all;
    line-height: 1.5;
    user-select: all;
    letter-spacing: -0.2px;
  }
  .copy-btn {
    background: none;
    border: 1px solid var(--border-cream);
    border-radius: 5px;
    padding: 5px;
    cursor: pointer;
    color: var(--stone-gray);
    transition: all 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 28px;
    height: 28px;
    flex-shrink: 0;
  }
  .copy-btn:hover { border-color: var(--border-warm); color: var(--charcoal); }
  .copy-btn.copied { color: var(--success); border-color: rgba(74,124,89,0.3); }
  .copy-btn svg { width: 13px; height: 13px; }

  /* ─── FOOTER ─── */
  .footer {
    padding: 16px 20px;
    text-align: center;
    border-top: 1px solid var(--border-cream);
  }
  .footer p {
    font-size: 11px;
    color: var(--stone-gray);
    line-height: 1.5;
  }
  .footer a {
    color: var(--olive-gray);
    text-decoration: none;
  }
  .footer a:hover { text-decoration: underline; }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center;
    padding: 20px 10px;
    color: var(--stone-gray);
    font-size: 13px;
  }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--near-black);
    color: var(--ivory);
    padding: 8px 16px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 500;
    z-index: 100;
    transition: transform 0.2s ease;
    box-shadow: rgba(0,0,0,0.12) 0px 6px 20px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 520px) {
    .container { padding: 20px 14px 16px; }
    .sliders { grid-template-columns: 1fr; gap: 10px; }
    .header { flex-direction: column; gap: 6px; }
    .presets-row { flex-direction: column; }
    .passphrase-text { font-size: 11.5px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0s !important; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Passphrase Generator</h1>
    <div class="header-links">
      <a href="https://github.com/ticketclosed-wontfix/pwgen" target="_blank">Source</a>
    </div>
  </div>

  <div class="card">
    <div class="presets-row">
      <button class="preset-btn active" onclick="applyPreset('short', this)">
        <div class="preset-name">Short</div>
        <div class="preset-desc">~25 chars</div>
      </button>
      <button class="preset-btn" onclick="applyPreset('medium', this)">
        <div class="preset-name">Medium</div>
        <div class="preset-desc">~39 chars</div>
      </button>
      <button class="preset-btn" onclick="applyPreset('long', this)">
        <div class="preset-name">Long</div>
        <div class="preset-desc">~73 chars</div>
      </button>
    </div>

    <div class="sliders">
      <div class="slider-group">
        <div class="slider-header">
          <span class="slider-label">Words</span>
          <span class="slider-value" id="wordCountVal">4</span>
        </div>
        <input type="range" id="wordCount" min="2" max="8" value="4" oninput="updateSliders()">
      </div>
      <div class="slider-group">
        <div class="slider-header">
          <span class="slider-label">Word length</span>
          <span class="slider-value" id="wordLenVal">3 – 5</span>
        </div>
        <div style="display:flex; gap:8px; align-items:center;">
          <input type="range" id="wordMin" min="2" max="12" value="3" style="flex:1" oninput="updateSliders()">
          <input type="range" id="wordMax" min="3" max="15" value="5" style="flex:1" oninput="updateSliders()">
        </div>
      </div>
      <div class="slider-group">
        <div class="slider-header">
          <span class="slider-label">Digits between</span>
          <span class="slider-value" id="numLenVal">1</span>
        </div>
        <input type="range" id="numLen" min="0" max="4" value="1" oninput="updateSliders()">
      </div>
      <div class="slider-group">
        <div class="slider-header">
          <span class="slider-label">Substitutions/word</span>
          <span class="slider-value" id="subsVal">2</span>
        </div>
        <input type="range" id="subsPerWord" min="0" max="5" value="2" oninput="updateSliders()">
      </div>
    </div>

    <button class="generate-btn" onclick="generate()">Generate</button>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="card">
      <div class="empty-state">Configure and click Generate</div>
    </div>
  </div>
</div>

<footer class="footer">
  <p>Runs entirely in your browser — nothing is sent or stored · <a href="https://github.com/ticketclosed-wontfix/pwgen" target="_blank">Open source</a> · Based on <a href="https://github.com/0xdaniooo/Secure-Passphrase-Generator" target="_blank">0xdaniooo</a></p>
</footer>

<div class="toast" id="toast">Copied</div>

const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
const numMapping = ['4','6','7','6','3','4','9','6','1','1','7','1','3','5','0','9','9','2','5','7','8','8','9','9','9','2'];
const specialChars = ['_','-','!','?','@','#','$','%','^','&','*','(',')','=','+','<','>'];

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function generatePassphrase(wordCount, minLen, maxLen, numLen, subsPerWord) {
  const pool = WORDS.filter(w => w.length >= minLen && w.length <= maxLen);
  if (pool.length === 0) return 'Error';
  const parts = [];
  for (let i = 0; i < wordCount; i++) {
    let word = pickRandom(pool);
    word = word.charAt(0).toUpperCase() + word.slice(1);
    if (subsPerWord > 0 && word.length > 1) {
      const chars = word.split('');
      const available = [];
      for (let j = 1; j < chars.length; j++) {
        if (alphabet.indexOf(chars[j].toLowerCase()) !== -1) available.push(j);
      }
      const toChange = available.sort(() => Math.random() - 0.5).slice(0, Math.min(subsPerWord, available.length));
      for (const j of toChange) {
        const idx = alphabet.indexOf(chars[j].toLowerCase());
        if (idx !== -1) chars[j] = numMapping[idx];
      }
      word = chars.join('');
    }
    parts.push(word);
    if (i < wordCount - 1 && numLen > 0) {
      let digits = '';
      for (let d = 0; d < numLen; d++) digits += randomInt(0, 9);
      const sp = pickRandom(specialChars);
      parts.push(randomInt(0, 1) === 0 ? sp + digits : digits + sp);
    }
  }
  return parts.join('');
}

function calcEntropy(pp) {
  const h = /[a-z]/.test(pp), u = /[A-Z]/.test(pp), d = /[0-9]/.test(pp), s = /[^a-zA-Z0-9]/.test(pp);
  let p = 0;
  if (h) p += 26; if (u) p += 26; if (d) p += 10; if (s) p += 18;
  return Math.round(pp.length * Math.log2(p || 26));
}

const presets = {
  short:  { wordCount: 4, wordMin: 3, wordMax: 5, numLen: 1, subs: 2 },
  medium: { wordCount: 5, wordMin: 4, wordMax: 6, numLen: 2, subs: 2 },
  long:   { wordCount: 5, wordMin: 10, wordMax: 15, numLen: 3, subs: 2 }
};

function applyPreset(name, btn) {
  const p = presets[name];
  document.getElementById('wordCount').value = p.wordCount;
  document.getElementById('wordMin').value = p.wordMin;
  document.getElementById('wordMax').value = p.wordMax;
  document.getElementById('numLen').value = p.numLen;
  document.getElementById('subsPerWord').value = p.subs;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateSliders();
}

function updateSliders() {
  let minV = parseInt(document.getElementById('wordMin').value);
  let maxV = parseInt(document.getElementById('wordMax').value);
  if (minV >= maxV) { maxV = minV + 1; document.getElementById('wordMax').value = maxV; }
  document.getElementById('wordCountVal').textContent = document.getElementById('wordCount').value;
  document.getElementById('wordLenVal').textContent = `${minV} – ${maxV}`;
  document.getElementById('numLenVal').textContent = document.getElementById('numLen').value;
  document.getElementById('subsVal').textContent = document.getElementById('subsPerWord').value;
}

function generate() {
  const wc = parseInt(document.getElementById('wordCount').value);
  const wmin = parseInt(document.getElementById('wordMin').value);
  const wmax = parseInt(document.getElementById('wordMax').value);
  const nl = parseInt(document.getElementById('numLen').value);
  const sp = parseInt(document.getElementById('subsPerWord').value);
  const results = [];
  for (let i = 0; i < 5; i++) results.push(generatePassphrase(wc, wmin, wmax, nl, sp));
  renderResults(results);
}

function renderResults(passphrases) {
  const container = document.getElementById('results');
  const avgEnt = Math.round(passphrases.reduce((s, p) => s + calcEntropy(p), 0) / passphrases.length);
  let html = `<div class="card"><div class="results-header"><span class="label">Generated</span><span class="entropy-inline">${avgEnt} bits avg</span><button class="copy-all-btn" onclick="copyAll()">Copy all</button></div>`;
  passphrases.forEach((pp, i) => {
    html += `<div class="passphrase-row"><span class="passphrase-text">${esc(pp)}</span><button class="copy-btn" onclick="copyOne(this,'${escJs(pp)}')" title="Copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escJs(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function copyOne(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    toast('Copied');
    setTimeout(() => btn.classList.remove('copied'), 1200);
  });
}

function copyAll() {
  const t = Array.from(document.querySelectorAll('.passphrase-text')).map(el => el.textContent).join('\n');
  navigator.clipboard.writeText(t).then(() => toast('Copied all'));
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

document.addEventListener('DOMContentLoaded', () => { updateSliders(); generate(); });
</script>
</body>
</html>
